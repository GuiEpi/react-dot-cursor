name: Publish Package

on:
  push:
    branches: ['main']

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check_version.outputs.version }}
      version_changed: ${{ steps.check_version.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Compare version with npm registry
        id: check_version
        run: |
          LOCAL=$(jq -r .version package.json)
          PUBLISHED=$(npm view react-dot-cursor version 2>/dev/null || echo "none")
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            VERSION_CHANGED=1
          else
            VERSION_CHANGED=0
          fi
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "version_changed=$VERSION_CHANGED" >> "$GITHUB_OUTPUT"
  publish:
    needs: version
    if: ${{ needs.version.outputs.version_changed == '1' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
      id-token: write # OIDC token for npm trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 bundles npm >= 11.5.1, required for OIDC trusted publishing
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Publish package
        run: pnpm publish --access public --no-git-checks

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ needs.version.outputs.version }}'
          name: 'v${{ needs.version.outputs.version }}'
          draft: false
          prerelease: false
