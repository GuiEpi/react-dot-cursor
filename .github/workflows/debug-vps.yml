name: Debug VPS

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect VPS state
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo '--- containers'
            docker ps -a --format '{{.Names}} | {{.Status}} | {{.Ports}}'
            echo '--- compose projects'
            docker compose ls -a
            echo '--- docker networks'
            docker network ls --format '{{.Name}}'
            echo '--- caddy logs'
            for c in $(docker ps -a --format '{{.Names}}' | grep -i caddy); do echo "== $c"; docker logs --tail 8 "$c" 2>&1 | tail -8; done
            echo '--- guics-edge dir'
            ls -d ~/guics-edge /opt/guics-edge 2>/dev/null || echo 'guics-edge introuvable dans ~ et /opt'
