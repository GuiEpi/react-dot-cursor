version: 2
updates:
  # JavaScript deps (pnpm workspace: root package + website)
  - package-ecosystem: 'npm'
    directories:
      - '/'
      - '/website'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      # one PR for all minor/patch bumps to cut noise
      minor-and-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']

  # Action versions used in workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  # Docker base images (Dockerfile)
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
