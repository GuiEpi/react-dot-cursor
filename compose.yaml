services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3
    volumes:
      # persist certs/config so redeploys don't re-hit Let's Encrypt
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
