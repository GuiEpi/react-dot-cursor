services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: react-dot-cursor
    restart: unless-stopped
    expose:
      - '8081' # reachable only by the edge caddy on the shared network, not the host
    networks:
      - edge

networks:
  edge:
    external: true # created by the immopad-bot-trafic-tracker stack (the edge Caddy)
